services:
  db:
    image: pgvector/pgvector:pg16
    container_name: patient-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql
    ports:
      - "5432:5432"
    command: postgres -c max_connections=20 -c shared_buffers=32MB -c work_mem=2MB -c maintenance_work_mem=8MB -c effective_cache_size=64MB
    mem_limit: 256m
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.50'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: patient-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    mem_limit: 64m
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.20'
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: bitnami/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_HEAP_OPTS=-Xms128m -Xmx192m
    mem_limit: 384m
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.50'
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server 127.0.0.1:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5

  patient-service:
    build:
      context: ./PatientService
      dockerfile: Dockerfile
    container_name: patient-service
    ports:
      - "4000:4000"
      - "9091:9091"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_CLOUD_VAULT_ENABLED=false
      - SPRING_CONFIG_IMPORT=optional:vault://
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${POSTGRES_DB}
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_SECURITY_USER_NAME=${SPRING_SECURITY_USER_NAME}
      - SPRING_SECURITY_USER_PASSWORD=${SPRING_SECURITY_USER_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    mem_limit: 256m
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.40'
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy

  gateway-service:
    build:
      context: ./GatewayService
      dockerfile: Dockerfile
    container_name: gateway-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_CLOUD_VAULT_ENABLED=false
      - SPRING_CONFIG_IMPORT=optional:vault://
      - PATIENT_SERVICE_URI=http://patient-service:4000
      - REDIS_HOST=redis
      - GRPC_CLIENT_PATIENT_SERVICE_ADDRESS=static://patient-service:9091
    mem_limit: 256m
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.40'
    depends_on:
      - patient-service
      - redis

  notification-service:
    build:
      context: ./NotificationService
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "4001:4001"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_MAIL_HOST=mailhog
      - SPRING_MAIL_PORT=1025
    mem_limit: 256m
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.30'
    depends_on:
      kafka:
        condition: service_healthy
      mailhog:
        condition: service_started

  ai-chat-service:
    build:
      context: ./AiChatService
      dockerfile: Dockerfile
    container_name: ai-chat-service
    ports:
      - "4002:4002"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PATIENT_SERVICE_GRPC_URI=patient-service:9091
    mem_limit: 256m
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.30'
    depends_on:
      - patient-service

  patient-dashboard:
    build:
      context: ./PatientDashboard
      dockerfile: Dockerfile
    container_name: patient-dashboard
    ports:
      - "4200:80"
    mem_limit: 32m
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: '0.10'
    depends_on:
      - gateway-service

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    mem_limit: 128m
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.20'
    depends_on:
      - patient-service

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    mem_limit: 192m
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: '0.20'
    depends_on:
      - prometheus

  vault:
    image: hashicorp/vault:latest
    container_name: vault
    ports:
      - "8200:8200"
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=root
      - VAULT_ADDR=http://0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    mem_limit: 64m
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.10'

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    container_name: keycloak
    command: start-dev
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
      - KC_HTTP_ENABLED=true
      - KC_HOSTNAME_STRICT=false
      - JAVA_OPTS_APPEND=-Xms128m -Xmx192m -XX:MaxMetaspaceSize=96m -XX:+UseSerialGC -XX:+TieredCompilation -XX:TieredStopAtLevel=1
    ports:
      - "8081:8080"
    mem_limit: 384m
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.50'

  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    mem_limit: 64m
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.10'

volumes:
  postgres-data:
