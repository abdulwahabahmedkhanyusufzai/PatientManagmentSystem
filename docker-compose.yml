services:
  db:
    image: pgvector/pgvector:pg16
    container_name: patient-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-patientdb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-google_level_password_123}
    volumes:
      - postgres-data:/var/lib/postgresql
    ports:
      - "5432:5432"
    command: postgres -c max_connections=20 -c shared_buffers=32MB -c work_mem=2MB -c maintenance_work_mem=8MB -c effective_cache_size=64MB
    mem_limit: 256m
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.50'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5


  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - CLUSTER_ID=MkU3OEVBNT-JENDU2MzE4
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    mem_limit: 384m
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.50'
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 15s
      retries: 5

  patient-service:
    build:
      context: ./PatientService
      dockerfile: Dockerfile
    image: ghcr.io/abdulwahabahmedkhanyusufzai/patient-service:sha-1df88e8
    container_name: patient-service
    ports:
      - "4000:4000"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/patientdb
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=google_level_password_123
      - SPRING_SECURITY_USER_NAME=${SPRING_SECURITY_USER_NAME}
      - SPRING_SECURITY_USER_PASSWORD=${SPRING_SECURITY_USER_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    mem_limit: 128m
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.40'
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy



  notification-service:
    build:
      context: ./NotificationService
      dockerfile: Dockerfile
    image: ghcr.io/abdulwahabahmedkhanyusufzai/notification-service:sha-1df88e8
    container_name: notification-service
    ports:
      - "4001:4001"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_MAIL_HOST=mailhog
      - SPRING_MAIL_PORT=1025
    mem_limit: 128m
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.30'
    depends_on:
      kafka:
        condition: service_healthy
      mailhog:
        condition: service_started

  ai-chat-service:
    build:
      context: ./AiChatService
      dockerfile: Dockerfile
    image: ghcr.io/abdulwahabahmedkhanyusufzai/ai-chat-service:sha-1df88e8
    container_name: ai-chat-service
    ports:
      - "4002:4002"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PATIENT_SERVICE_URL=http://patient-service:4000
    mem_limit: 128m
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.30'
    depends_on:
      - patient-service

  patient-dashboard:
    build:
      context: ./PatientDashboard
      dockerfile: Dockerfile
    image: ghcr.io/abdulwahabahmedkhanyusufzai/patient-dashboard:sha-1df88e8
    container_name: patient-dashboard
    ports:
      - "4200:80"
    mem_limit: 32m
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: '0.10'
    depends_on:
      - patient-service
      - ai-chat-service




  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    mem_limit: 64m
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.10'

volumes:
  postgres-data:
