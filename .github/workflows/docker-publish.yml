name: Build and Publish Docker Images

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        service:
          - name: patient-service
            context: ./PatientService
          - name: notification-service
            context: ./NotificationService
          - name: ai-chat-service
            context: ./AiChatService
          - name: patient-dashboard
            context: ./PatientDashboard

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.service.name }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-compose:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update docker-compose.yml
        run: |
          SHA_TAG="sha-$(git rev-parse --short HEAD)"
          echo "Updating docker-compose.yml with tag: ${SHA_TAG}"
          sed -i "s|ghcr.io/abdulwahabahmedkhanyusufzai/patient-service:.*|ghcr.io/abdulwahabahmedkhanyusufzai/patient-service:${SHA_TAG}|g" docker-compose.yml
          sed -i "s|ghcr.io/abdulwahabahmedkhanyusufzai/notification-service:.*|ghcr.io/abdulwahabahmedkhanyusufzai/notification-service:${SHA_TAG}|g" docker-compose.yml
          sed -i "s|ghcr.io/abdulwahabahmedkhanyusufzai/ai-chat-service:.*|ghcr.io/abdulwahabahmedkhanyusufzai/ai-chat-service:${SHA_TAG}|g" docker-compose.yml
          sed -i "s|ghcr.io/abdulwahabahmedkhanyusufzai/patient-dashboard:.*|ghcr.io/abdulwahabahmedkhanyusufzai/patient-dashboard:${SHA_TAG}|g" docker-compose.yml

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docker-compose.yml
          
          if git diff --cached --quiet; then
            echo "No changes in docker-compose.yml, skipping commit."
          else
            git commit -m "chore(cd): update docker-compose.yml image tags to sha-$(git rev-parse --short HEAD) [skip ci]"
            git push
          fi
