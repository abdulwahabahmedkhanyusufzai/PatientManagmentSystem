name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Build and Test with Maven
      run: mvn clean package

    - name: Enforce startup-time budget
      run: bash ./scripts/perf/check_startup_time.sh

    - name: Enforce memory budget
      run: bash ./scripts/perf/check_memory_budget.sh

    - name: Enforce image-size budget
      run: bash ./scripts/perf/check_image_sizes.sh

    - name: Run Snyk to check for vulnerabilities
      uses: snyk/actions/maven@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high

    - name: Run K6 Load Test
      uses: grafana/k6-action@v0.3.1
      with:
        filename: k6/load-test.js
        flags: --out json=results.json
