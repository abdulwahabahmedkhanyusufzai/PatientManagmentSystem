apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: patient-service-latency
  namespace: patient-system
spec:
  action: delay
  mode: one
  selector:
    labelSelectors:
      app: patient-service
  delay:
    latency: "200ms"
    correlation: "100"
    jitter: "0ms"
  duration: "5m"
  scheduler:
    cron: "@every 10m"
