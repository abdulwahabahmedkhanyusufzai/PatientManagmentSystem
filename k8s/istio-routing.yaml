apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: patient-gateway
spec:
  selector:
    istio: ingressgateway
  ports:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "*"
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: gateway-service
spec:
  hosts:
    - "*"
  gateways:
    - patient-gateway
  http:
    - route:
        - destination:
            host: gateway-service
            port:
              number: 8080
---
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: patient-service
spec:
  host: patient-service
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
  subsets:
    - name: v1
      labels:
        version: v1
    - name: v2
      labels:
        version: v2
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: patient-service
spec:
  hosts:
    - patient-service
  http:
    - route:
        - destination:
            host: patient-service
            subset: v1
          weight: 90
        - destination:
            host: patient-service
            subset: v2
          weight: 10
