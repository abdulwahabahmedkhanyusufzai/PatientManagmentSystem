apiVersion: v1
kind: Service
metadata:
  name: patient-db
spec:
  ports:
    - port: 5432
  selector:
    app: patient-db
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-db
spec:
  selector:
    matchLabels:
      app: patient-db
  template:
    metadata:
      labels:
        app: patient-db
    spec:
      containers:
        - name: db
          image: postgres:18-alpine
          env:
            - name: POSTGRES_DB
              value: patientdb
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql
      volumes:
        - name: postgres-storage
          emptyDir: {}
