apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: patient-management-system
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-username/PatientManagementSystem.git # Placeholder
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: patient-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
