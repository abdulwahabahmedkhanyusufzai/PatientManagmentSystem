apiVersion: v1
kind: Service
metadata:
  name: patient-service
spec:
  ports:
    - name: http
      port: 4000
      targetPort: 4000
    - name: grpc
      port: 9091
      targetPort: 9091
  selector:
    app: patient-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service-v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: patient-service
      version: v1
  template:
    metadata:
      labels:
        app: patient-service
        version: v1
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      containers:
        - name: patient-service
          image: patient-service:latest
          ports:
            - containerPort: 4000
            - containerPort: 9091
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod

            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://patient-db:5432/patientdb
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
            - name: SPRING_DATASOURCE_PASSWORD
              value: postgres
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: update
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: 1
              memory: 256Mi
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 4000
            failureThreshold: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 4000
            initialDelaySeconds: 1
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 4000
            initialDelaySeconds: 1
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    app: gateway-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      containers:
        - name: gateway-service
          image: gateway-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod

            - name: SPRING_CLOUD_GATEWAY_ROUTES_0_ID
              value: patient-service
            - name: SPRING_CLOUD_GATEWAY_ROUTES_0_URI
              value: http://patient-service:4000
            - name: SPRING_CLOUD_GATEWAY_ROUTES_0_PREDICATES_0
              value: Path=/patients/**
            - name: REDIS_HOST
              value: redis
          resources:
            requests:
              cpu: 150m
              memory: 128Mi
            limits:
              cpu: 600m
              memory: 256Mi
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            failureThreshold: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 1
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 1
            periodSeconds: 10
