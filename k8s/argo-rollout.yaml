apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: patient-service
  namespace: patient-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: patient-service
  template:
    metadata:
      labels:
        app: patient-service
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      containers:
        - name: patient-service
          image: patient-service:latest
          ports:
            - containerPort: 4000
            - containerPort: 9091
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://patient-db:5432/patientdb
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
            - name: SPRING_DATASOURCE_PASSWORD
              value: postgres
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 4000
  strategy:
    canary:
      canaryService: patient-service-canary
      stableService: patient-service-stable
      trafficRouting:
        istio:
          virtualService:
            name: patient-service
            routes:
              - primary
      steps:
        - setWeight: 10
        - pause: {duration: 5m}
        - analysis:
            templates:
              - templateName: success-rate
        - setWeight: 50
        - pause: {duration: 10m}
        - setWeight: 100
---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate
  namespace: patient-system
spec:
  args:
    - name: service-name
  metrics:
    - name: success-rate
      interval: 1m
      successCondition: result[0] >= 0.99
      failureLimit: 2
      provider:
        prometheus:
          address: http://prometheus.default.svc.cluster.local:9090
          query: |
            sum(rate(http_server_requests_seconds_count{uri!~"/actuator.*", status!~"5.*", service="{{args.service-name}}"}[1m])) 
            / 
            sum(rate(http_server_requests_seconds_count{uri!~"/actuator.*", service="{{args.service-name}}"}[1m]))
