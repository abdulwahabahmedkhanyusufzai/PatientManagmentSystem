server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    discovery:
      enabled: false
      simple:
        enabled: false
    gateway:
      server:
        webflux:
          routes:
            - id: patient-service
              uri: http://localhost:4000
              predicates:
                - Path=/patients/**

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
