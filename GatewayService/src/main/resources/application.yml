server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    discovery:
      enabled: false
      simple:
        enabled: false
    gateway:
      routes:
        - id: patient-service
          uri: ${PATIENT_SERVICE_URI:http://localhost:4000}
          predicates:
            - Path=/patients/**
          filters:
            - name: CircuitBreaker
              args:
                name: patientServiceCB
                fallbackUri: forward:/fallback/patient-service
            - name: Retry
              args:
                retries: 3
                methods: GET
                backoff:
                  firstBackoff: 10ms
                  maxBackoff: 50ms
                  factor: 2
                  basedOnPreviousValue: false

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
        permittedNumberOfCallsInHalfOpenState: 3
    instances:
      patientServiceCB:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 2s

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
