server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Patient Service
        url: /v3/api-docs/patient-service
  api-docs:
    path: /v3/api-docs
  gateway:
    enabled: true

spring:
  application:
    name: gateway-service
  cloud:
    discovery:
      enabled: false
      simple:
        enabled: false
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: patient-service
          uri: ${PATIENT_SERVICE_URI:http://localhost:4000}
          predicates:
            - Path=/patients/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: patientServiceCB
                fallbackUri: forward:/fallback/patient-service
            - name: Retry
              args:
                retries: 3
                methods: GET
                backoff:
                  firstBackoff: 10ms
                  maxBackoff: 50ms
                  factor: 2
                  basedOnPreviousValue: false
        - id: patient-service-docs
          uri: ${PATIENT_SERVICE_URI:http://localhost:4000}
          predicates:
            - Path=/v3/api-docs/patient-service
          filters:
            - RewritePath=/v3/api-docs/patient-service, /v3/api-docs

        - id: ai-chat-service
          uri: ${AI_CHAT_SERVICE_URI:http://localhost:4002}
          predicates:
            - Path=/chat/**

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379



resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
        permittedNumberOfCallsInHalfOpenState: 3
    instances:
      patientServiceCB:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 2s

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
